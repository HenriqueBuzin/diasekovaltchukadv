services:
  diasekovaltchuk:
    profiles: ["prod"]
    restart: unless-stopped
    build: .
    working_dir: /app
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    env_file:
      - .env
    networks:
      - proxy-network

  diasekovaltchuk-dev:
    profiles: ["dev"]
    restart: unless-stopped
    build: .
    working_dir: /app
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    env_file:
      - .env
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
